name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends mercurial shellcheck

      - name: Run repository checks
        run: bash tests/run-all.sh

      - name: Ban legacy Mercurial branch commands
        run: |
          if grep -nE '^[^#]*\bhg[[:space:]]+branch(es)?\b' plugins/planning/skills/exec/scripts/*.sh; then
            echo "ERROR: use bookmark primitives for Mercurial portability" >&2
            exit 1
          fi
